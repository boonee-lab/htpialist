        <footer class="text-center text-xs text-gray-400 mt-10">
            數據儲存於瀏覽器，跨日與週六 06:00 自動重置。
        </footer>
    </div>

    <script>
        const DAILY_RESET_HOUR = 6;
        const WEEKLY_RESET_DAY = 6; // Saturday

        function updateTimers() {
            const now = new Date();
            
            // 每日刷新邏輯
            let dailyReset = new Date();
            dailyReset.setHours(DAILY_RESET_HOUR, 0, 0, 0);
            if (now >= dailyReset) dailyReset.setDate(dailyReset.getDate() + 1);
            
            const dDiff = dailyReset - now;
            document.getElementById('dailyTimer').innerText = formatDiff(dDiff);

            // 每週刷新邏輯 (週六 06:00)
            let weeklyReset = new Date();
            let daysUntilSat = (WEEKLY_RESET_DAY - now.getDay() + 7) % 7;
            if (daysUntilSat === 0 && now.getHours() >= DAILY_RESET_HOUR) daysUntilSat = 7;
            weeklyReset.setDate(now.getDate() + daysUntilSat);
            weeklyReset.setHours(DAILY_RESET_HOUR, 0, 0, 0);

            const wDiff = weeklyReset - now;
            document.getElementById('weeklyTimer').innerText = formatWeeklyDiff(wDiff);

            // 自動重置檢查
            checkAutoReset(now);
        }

        function formatDiff(ms) {
            const h = Math.floor(ms / 3600000).toString().padStart(2, '0');
            const m = Math.floor((ms % 3600000) / 60000).toString().padStart(2, '0');
            const s = Math.floor((ms % 60000) / 1000).toString().padStart(2, '0');
            return `${h}:${m}:${s}`;
        }

        function formatWeeklyDiff(ms) {
            const d = Math.floor(ms / 86400000);
            return `${d}d ` + formatDiff(ms % 86400000);
        }

        function saveData() {
            const daily = Array.from(document.querySelectorAll('#dailyContainer input')).map(el => el.checked);
            const weekly = Array.from(document.querySelectorAll('#weeklyContainer input')).map(el => el.checked);
            
            const data = {
                daily,
                weekly,
                lastDailyReset: localStorage.getItem('lastDailyReset') || getPrevResetTime(DAILY_RESET_HOUR).getTime(),
                lastWeeklyReset: localStorage.getItem('lastWeeklyReset') || getPrevWeeklyResetTime().getTime()
            };
            localStorage.setItem('town_data', JSON.stringify(data));
        }

        function getPrevResetTime(hour) {
            let d = new Date();
            d.setHours(hour, 0, 0, 0);
            if (new Date() < d) d.setDate(d.getDate() - 1);
            return d;
        }

        function getPrevWeeklyResetTime() {
            let d = getPrevResetTime(DAILY_RESET_HOUR);
            while (d.getDay() !== WEEKLY_RESET_DAY) {
                d.setDate(d.getDate() - 1);
            }
            return d;
        }

        function checkAutoReset(now) {
            const data = JSON.parse(localStorage.getItem('town_data'));
            if (!data) return;

            const lastDaily = new Date(parseInt(data.lastDailyReset));
            const lastWeekly = new Date(parseInt(data.lastWeeklyReset));
            
            const nextDaily = new Date(lastDaily);
            nextDaily.setDate(nextDaily.getDate() + 1);

            const nextWeekly = new Date(lastWeekly);
            nextWeekly.setDate(nextWeekly.getDate() + 7);

            let needSave = false;

            if (now >= nextDaily) {
                data.daily = data.daily.fill(false);
                data.lastDailyReset = getPrevResetTime(DAILY_RESET_HOUR).getTime();
                needSave = true;
            }

            if (now >= nextWeekly) {
                data.weekly = data.weekly.fill(false);
                data.lastWeeklyReset = getPrevWeeklyResetTime().getTime();
                needSave = true;
            }

            if (needSave) {
                localStorage.setItem('town_data', JSON.stringify(data));
                loadData();
            }
        }

        function loadData() {
            const data = JSON.parse(localStorage.getItem('town_data'));
            if (data) {
                const dailyCheckboxes = document.querySelectorAll('#dailyContainer input');
                const weeklyCheckboxes = document.querySelectorAll('#weeklyContainer input');
                data.daily.forEach((c, i) => { if(dailyCheckboxes[i]) dailyCheckboxes[i].checked = c; });
                data.weekly.forEach((c, i) => { if(weeklyCheckboxes[i]) weeklyCheckboxes[i].checked = c; });
            }
        }

        setInterval(updateTimers, 1000);
        window.onload = () => { updateTimers(); loadData(); };
    </script>
